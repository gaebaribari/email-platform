# 소스 매핑 정의 — "매핑을 코드가 아닌 데이터로" (포인트 ①)
#
# 새 소스(=새 병원, 새 CRM)가 추가될 때 코드를 고치지 않는다.
# 이 YAML 한 장만 추가하면 파이프라인이 그대로 처리한다.
#
# legacy-crm: 2019년 폐기된 사내 CRM의 고객 export.
# 컬럼명이 영/한 혼용이고 국가가 자유 입력이라 표기가 제각각이다.

name: legacy-crm
label: 구(舊) 사내 CRM
description: 2019년 폐기된 사내 CRM의 고객 export. 컬럼명 영·한 혼용, 국가 자유입력.

# pre-validation: 원천에 반드시 존재해야 하는 컬럼. 없으면 변환 전에 중단한다.
required_columns:
  - Email

# 컬럼 매핑: 타깃 필드 <- 원천 컬럼
#   from      : 나열한 컬럼 중 처음으로 값이 있는 컬럼을 채택 (별칭 흡수)
#   normalize : 아래 normalize 사전을 적용해 표준값으로 변환
fields:
  email:
    from: [Email, "E-mail", 이메일, mail]
  name:
    from: ["Customer Name", 고객명, 이름, name, "Full Name", FullName]
  country:
    from: [Country, 국가, 거주국]
    normalize: country

# 값 정규화 사전: 표준값 <- [동의어 / 약어 / 오타 ...]
# 매칭은 trim + 소문자 기준. 여기에 없는 값은 '예외'로 집계된다 (포인트 ③).
normalize:
  country:
    KR: [한국, 대한민국, KR, "South Korea", korea, 한꾹]
    US: [미국, US, USA, "United States", "U.S.", america]
    JP: [일본, JP, Japan, 니혼]
    CN: [중국, CN, China, 중국본토]
